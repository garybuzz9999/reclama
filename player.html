<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdScreen Player</title>
  <style>
    :root {
      --bg:#000;--surface:#0f0f0f;--surface2:#181818;--border:#222;
      --accent:#f5c842;--text:#f0f0f0;--muted:#555;--green:#3ddc84;--red:#ff4d4d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}

    /* ── SETUP SCREEN ── */
    #screen-setup{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100dvh;padding:32px 24px;background:var(--bg);
    }
    .setup-logo{
      font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;
      text-align:center;
    }
    .setup-logo span{color:var(--accent);}
    .setup-tagline{font-size:13px;color:var(--muted);margin-bottom:40px;text-align:center;}
    .setup-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:32px;width:100%;max-width:400px;
    }
    .setup-label{
      font-size:11px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    }
    .setup-inp{
      width:100%;background:var(--surface2);border:1px solid var(--border);
      border-radius:12px;padding:16px;font-size:18px;color:var(--accent);
      letter-spacing:3px;text-align:center;text-transform:uppercase;
      outline:none;font-family:'SF Mono','Fira Code',monospace;
      transition:border-color .2s;margin-bottom:20px;
    }
    .setup-inp:focus{border-color:var(--accent);}
    .setup-inp::placeholder{color:var(--border);letter-spacing:1px;font-size:14px;}
    .setup-zone-label{
      font-size:11px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    }
    .zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
    .zone-opt{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:14px;text-align:center;cursor:pointer;
      font-size:14px;font-weight:600;color:var(--muted);transition:all .2s;
    }
    .zone-opt:hover{border-color:var(--accent);color:var(--text);}
    .zone-opt.selected{background:rgba(245,200,66,.08);border-color:var(--accent);color:var(--accent);}
    .zone-opt.full{grid-column:1/-1;}
    .btn-start{
      width:100%;background:var(--accent);color:#000;border:none;
      border-radius:12px;padding:18px;font-size:17px;font-weight:800;
      cursor:pointer;transition:opacity .2s;letter-spacing:.3px;
    }
    .btn-start:hover{opacity:.88;}
    .setup-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:20px;}

    /* ── PLAYER SCREEN ── */
    #screen-player{
      display:none;flex-direction:column;height:100dvh;
      position:fixed;inset:0;background:#000;
    }

    /* Media zone */
    .media-zone{
      flex:1;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }

    /* Idle / заставка */
    .idle-frame{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#000;z-index:1;
      transition:opacity .8s;
      background-size:cover;background-position:center;
    }
    .idle-frame.has-bg .idle-logo,
    .idle-frame.has-bg .idle-zone{display:none;}
    .idle-frame.has-bg .idle-clock{color:rgba(255,255,255,.15);}
    .currency-board{
      position:absolute;inset:0;display:none;
      flex-direction:column;justify-content:center;align-items:center;
      background:#003087;padding:24px;box-sizing:border-box;
    }
    .currency-board.show{display:flex;}
    .currency-title{font-size:clamp(18px,4vw,36px);font-weight:900;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:1px;}
    .currency-date{font-size:clamp(11px,2vw,16px);color:rgba(255,255,255,.7);margin-bottom:16px;}
    .currency-table{width:100%;max-width:600px;}
    .currency-header{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:8px;margin-bottom:8px;font-size:clamp(10px,1.5vw,13px);color:rgba(255,255,255,.6);font-weight:700;text-align:center;}
    .currency-row{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.15);align-items:center;}
    .currency-flag{font-size:clamp(18px,3vw,28px);text-align:center;}
    .currency-name{font-size:clamp(12px,2vw,18px);font-weight:700;color:#fff;}
    .currency-val{font-size:clamp(14px,2.5vw,22px);font-weight:900;color:#ff3333;text-align:center;}
    .idle-logo{
      font-size:clamp(20px,5vw,40px);font-weight:900;
      letter-spacing:-1px;margin-bottom:6px;
    }
    .idle-logo span{color:var(--accent);}
    .idle-clock{
      font-size:clamp(56px,14vw,110px);font-weight:200;
      color:#222;letter-spacing:-4px;
      font-variant-numeric:tabular-nums;line-height:1;
    }
    .idle-zone{font-size:12px;color:#333;margin-top:8px;
      text-transform:uppercase;letter-spacing:2px;}



    /* Banner */
    .banner-frame{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .8s;z-index:2;
    }
    .banner-frame.active{opacity:1;}
    .banner-frame img,.banner-frame video{
      width:100%;height:100%;object-fit:contain;
    }
    .banner-progress{
      position:absolute;bottom:0;left:0;right:0;height:4px;
      background:rgba(255,255,255,.08);z-index:4;
    }
    .banner-progress-fill{
      height:100%;background:var(--accent);width:0%;
      transition:width linear;
    }

    /* Status bar */
    .status-bar{
      position:absolute;top:0;left:0;right:0;z-index:5;
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 16px;
      background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
      pointer-events:none;
    }
    .status-zone{font-size:11px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:rgba(255,255,255,.3);}
    .status-time{font-size:11px;color:rgba(255,255,255,.2);
      font-variant-numeric:tabular-nums;}

    /* ── CONTROL BAR ── */
    .control-bar{
      background:#080808;border-top:2px solid #1a1a1a;
      padding:14px 14px;flex-shrink:0;
    }
    .driver-row{
      display:flex;align-items:stretch;gap:8px;
      margin-bottom:10px;
    }
    .btn-toggle-ad{
      flex:1;border:none;border-radius:12px;
      padding:18px;font-size:18px;font-weight:900;
      cursor:pointer;transition:all .2s;text-align:center;
    }
    .btn-toggle-ad.on{
      background:rgba(61,220,132,.12);
      border:2px solid rgba(61,220,132,.3);color:var(--green);
    }
    .btn-toggle-ad.off{
      background:rgba(255,77,77,.1);
      border:2px solid rgba(255,77,77,.25);color:var(--red);
    }
    .btn-shell{
      background:#111;border:2px solid #222;
      border-radius:12px;padding:18px 16px;
      font-size:16px;font-weight:800;
      color:#555;cursor:pointer;white-space:nowrap;
      transition:all .2s;flex-shrink:0;
    }
    .btn-shell.active{
      background:rgba(77,159,255,.1);
      border-color:rgba(77,159,255,.3);color:#4d9fff;
    }
    .btn-reset{
      background:#111;border:2px solid #1a1a1a;
      border-radius:12px;padding:18px 14px;font-size:18px;
      color:#333;cursor:pointer;flex-shrink:0;transition:all .2s;
    }
    .btn-reset:hover{border-color:var(--red);color:var(--red);}
    .client-row{
      display:flex;align-items:center;gap:6px;
    }
    .music-label{
      font-size:11px;color:#333;white-space:nowrap;flex-shrink:0;
    }
    .genre-btns{
      display:flex;gap:6px;overflow-x:auto;
      scrollbar-width:none;flex:1;
    }
    .genre-btns::-webkit-scrollbar{display:none;}
    .genre-btn{
      background:#111;border:2px solid #1e1e1e;
      border-radius:24px;padding:12px 20px;
      font-size:16px;font-weight:700;
      color:#555;cursor:pointer;white-space:nowrap;
      transition:all .2s;flex-shrink:0;
    }
    .genre-btn:hover{border-color:var(--accent);color:var(--text);}
    .genre-btn.active{
      background:rgba(245,200,66,.1);
      border-color:var(--accent);color:var(--accent);
    }
    .genre-btn.mute{padding:12px 16px;font-size:18px;}
    .genre-btn.mute.active{
      background:rgba(255,77,77,.1);
      border-color:var(--red);color:var(--red);
    }

    .toast{
      position:fixed;bottom:50%;left:50%;
      transform:translateX(-50%) translateY(60px);
      background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:10px 20px;
      font-size:13px;color:var(--text);z-index:999;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap;pointer-events:none;
    }
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* PIN MODAL */
    .pin-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.95);z-index:500;
      flex-direction:column;align-items:center;justify-content:center;
    }
    .pin-overlay.active{display:flex;}
    .pin-title{
      font-size:18px;font-weight:700;color:var(--text);
      margin-bottom:8px;text-align:center;
    }
    .pin-sub{font-size:13px;color:var(--muted);margin-bottom:32px;text-align:center;}
    .pin-dots{
      display:flex;gap:16px;margin-bottom:32px;
    }
    .pin-dot{
      width:18px;height:18px;border-radius:50%;
      background:#222;border:2px solid #333;
      transition:all .2s;
    }
    .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
    .pin-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:10px;width:260px;
    }
    .pin-btn{
      background:#111;border:2px solid #222;
      border-radius:14px;padding:20px;
      font-size:24px;font-weight:700;color:var(--text);
      cursor:pointer;text-align:center;transition:all .2s;
    }
    .pin-btn:hover,.pin-btn:active{
      background:rgba(245,200,66,.1);border-color:var(--accent);color:var(--accent);
    }
    .pin-btn.del{font-size:18px;color:var(--muted);}
    .pin-error{color:var(--red);font-size:13px;margin-top:16px;min-height:20px;text-align:center;}
    .pin-cancel{
      margin-top:20px;background:none;border:none;
      color:var(--muted);font-size:14px;cursor:pointer;
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup">
  <div class="setup-logo">Ad<span>Screen</span></div>
  <div class="setup-tagline">Рекламний екран · Введіть ліцензійний код</div>
  <div class="setup-card">
    <div class="setup-label">Ліцензійний код</div>
    <input class="setup-inp" id="setup-code"
      placeholder="ADS-XXXX-XXXX-001" maxlength="20"
      oninput="formatCode(this)">
    <button onclick="saveCode()" style="width:100%;margin-top:8px;padding:10px;background:#2a2a2a;color:#facc15;border:1px solid #facc15;border-radius:8px;font-size:14px;cursor:pointer;">💾 Запам'ятати код</button>
    <div class="setup-zone-label">Зона показу</div>
    <div class="zone-grid">
      <div class="zone-opt" data-zone="north" onclick="selectZone(this)">⬆️ Північ</div>
      <div class="zone-opt" data-zone="east"  onclick="selectZone(this)">➡️ Схід</div>
      <div class="zone-opt" data-zone="west"  onclick="selectZone(this)">⬅️ Захід</div>
      <div class="zone-opt" data-zone="south" onclick="selectZone(this)">⬇️ Південь</div>
      <div class="zone-opt full selected" data-zone="center" onclick="selectZone(this)">🏙 Центр</div>
    </div>
    <button class="btn-start" onclick="startPlayer()">▶ Запустити екран</button>
    <div class="setup-err" id="setup-err"></div>
    <a href="/" style="display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none;">← На головну adscreen.online</a>
  </div>
</div>

<!-- PLAYER -->
<div id="screen-player">

  <!-- Status -->
  <div class="status-bar">
    <div class="status-zone" id="status-zone">—</div>
    <div class="status-time" id="status-time">—</div>
  </div>

  <!-- Media -->
  <div class="media-zone">
    <!-- Заставка -->
    <div class="idle-frame" id="idle-frame">
      <div class="idle-logo">Ad<span>Screen</span></div>
      <div class="idle-clock" id="idle-clock">00:00</div>
      <div class="idle-zone" id="idle-zone-label">—</div>
      <div class="currency-board" id="currency-board">
        <div class="currency-title">ОБМІН ВАЛЮТ</div>
        <div class="currency-date" id="currency-date"></div>
        <div class="currency-table">
          <div class="currency-header"><div></div><div>Валюта</div><div>Купівля</div><div>Продаж</div></div>
          <div id="currency-rows-display"></div>
        </div>
      </div>
      <a href="https://adscreen.online" style="
        position:absolute;bottom:16px;right:16px;
        background:none;border:1px solid #1a1a1a;
        border-radius:8px;padding:8px 14px;
        font-size:11px;color:#2a2a2a;cursor:pointer;
        text-decoration:none;transition:all .3s;
      " onmouseover="this.style.borderColor='#444';this.style.color='#555'"
         onmouseout="this.style.borderColor='#1a1a1a';this.style.color='#2a2a2a'">
        На головну →
      </a>
    </div>

    <!-- Банер -->
    <div class="banner-frame" id="banner-frame">
      <img id="banner-img" src="" alt="" style="display:none;">
      <video id="banner-video" src="" style="display:none;" playsinline></video>
      <div class="banner-progress">
        <div class="banner-progress-fill" id="banner-progress"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="control-bar">
    <!-- Водій -->
    <div class="driver-row">

      <button class="btn-toggle-ad on" id="btn-toggle-ad" onclick="toggleAd()">
        ▶ Реклама увімкнена
      </button>
      <button class="btn-shell" id="btn-shell" onclick="toggleFullscreen()">⛶ Екран</button>
      <button class="btn-reset" id="btn-reset" onclick="tapReset()">🔄</button>
    </div>
    <!-- Клієнт -->
    <div class="client-row">
      <div class="music-label" id="music-now">🎵 Музика:</div>
      <div class="genre-btns">
        <button class="genre-btn" data-tag="pop" onclick="playTag(this,'Поп')">Поп</button>
        <button class="genre-btn" data-tag="jazz" onclick="playTag(this,'Джаз')">Джаз</button>
        <button class="genre-btn" data-tag="rock" onclick="playTag(this,'Рок')">Рок</button>
        <button class="genre-btn" data-tag="hip-hop" onclick="playTag(this,'Реп')">Реп</button>
        <button class="genre-btn" data-tag="lounge" onclick="playTag(this,'Лаунж')">Лаунж</button>
        <button class="genre-btn mute" onclick="toggleMute(this)">🔇</button>
      </div>
    </div>
  </div>
</div>

<audio id="radio" preload="none"></audio>
<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-title" id="pin-title">Встановити PIN</div>
  <div class="pin-sub" id="pin-sub">Введіть 4 цифри для блокування</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn del" onclick="pinPress('del')">⌫</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinPress('ok')">OK</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <button class="pin-cancel" id="pin-cancel" onclick="closePinModal()">Скасувати</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, getDocs, collection, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3Cbg9SN5Oeb3QMwtEnE_duCnSTtoqr7g",
  authDomain: "reklama-7ed3d.firebaseapp.com",
  projectId: "reklama-7ed3d",
  storageBucket: "reklama-7ed3d.firebasestorage.app",
  messagingSenderId: "992657806561",
  appId: "1:992657806561:web:30a44b179c04b73f8c53a0"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const ZONES = {center:'🏙 Центр',north:'⬆️ Північ',south:'⬇️ Південь',west:'⬅️ Захід',east:'➡️ Схід'};
const PAUSE_BETWEEN = 10 * 1000; // 10 сек для тесту (5*60*1000 для продакшну)
const RELOAD_INTERVAL = 10 * 60 * 1000;

let currentZone = 'center';
let currentClientId = '';
let banners = [];
let bannerIndex = 0;
let adActive = true;
let bannerTimeout = null;
let isMuted = false;
let currentGenre = null;
let currentUtterance = null;

// ── FORMAT CODE ──
window.formatCode = inp => {
  let v = inp.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if (v.length > 3)  v = v.slice(0,3)+'-'+v.slice(3);
  if (v.length > 8)  v = v.slice(0,8)+'-'+v.slice(8);
  if (v.length > 13) v = v.slice(0,13)+'-'+v.slice(13);
  inp.value = v.slice(0,20);
};

window.saveCode = () => {
  const code = document.getElementById('setup-code').value.trim().toUpperCase();
  if (code.length < 10) { alert('Введіть ліцензійний код'); return; }
  localStorage.setItem('ads_code', code);
  localStorage.setItem('ads_zone', currentZone);
  alert('✅ Код запам\'ятано!');
};

window.selectZone = btn => {
  document.querySelectorAll('.zone-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  currentZone = btn.dataset.zone;
};

// ── START ──
window.startPlayer = async () => {
  const code = document.getElementById('setup-code').value.trim().toUpperCase();
  const err  = document.getElementById('setup-err');
  err.textContent = '';
  if (code.length < 10) { err.textContent = 'Введіть ліцензійний код'; return; }
  err.textContent = '⏳ Перевірка...';
  try {
    const snap = await getDocs(query(collection(db,'licenses'), where('code','==',code)));
    if (snap.empty) { err.textContent = '❌ Код не знайдено'; return; }
    const licData = snap.docs[0].data();
    currentClientId = licData.clientId || '';
    localStorage.setItem('ads_code', code);
    localStorage.setItem('ads_zone', currentZone);
    localStorage.setItem('ads_client_id', currentClientId);
    showScreen('player');
    initPlayer(currentZone);
  } catch(e) {
    err.textContent = '❌ Помилка: ' + e.message;
  }
};

// ── INIT ──
async function initPlayer(zone) {
  document.getElementById('status-zone').textContent = ZONES[zone]||zone;
  document.getElementById('idle-zone-label').textContent = ZONES[zone]||zone;
  setInterval(updateClock, 1000);
  updateClock();
  await loadBanners(zone);
  const savedCode2 = localStorage.getItem('ads_code');
  if (savedCode2) loadClientSettings(savedCode2);
  scheduleNext();
  setInterval(() => loadBanners(zone), RELOAD_INTERVAL);
}

async function loadBanners(zone) {
  try {
    const clientId = currentClientId || localStorage.getItem('ads_client_id') || '';
    let q;
    if (clientId) {
      q = query(collection(db,'banners'),
        where('status','==','active'),
        where('clientId','==',clientId)
      );
    } else {
      q = query(collection(db,'banners'), where('status','==','active'));
    }
    const snap = await getDocs(q);
    banners = snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(b => b.zones && (b.zones.includes('all') || b.zones.includes(zone)));
  } catch(e) { banners = []; }
}

async function loadClientSettings(code) {
  try {
    // Знаходимо ліцензію → clientId → налаштування
    const licSnap = await getDocs(query(collection(db,'licenses'), where('code','==',code)));
    if (licSnap.empty) return;
    const clientId = licSnap.docs[0].data().clientId;
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const clientSnap = await getDoc(doc(db,'clients',clientId));
    if (!clientSnap.exists()) return;
    const settings = clientSnap.data().settings || {};
    if (settings.bgUrl) {
      const idle = document.getElementById('idle-frame');
      idle.style.backgroundImage = `url('${settings.bgUrl}')`;
      idle.classList.add('has-bg');
    }
    // Завантажуємо курс валют
    try {
      const curSnap = await getDoc(doc(db,'currency',clientId));
      if (curSnap.exists()) {
        const cur = curSnap.data();
        if (cur.active) renderCurrencyBoard(cur);
        // Слухаємо зміни курсу в реальному часі
        const { onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        onSnapshot(doc(db,'currency',clientId), snap => {
          if (snap.exists()) {
            const d = snap.data();
            if (d.active) renderCurrencyBoard(d);
            else hideCurrencyBoard();
          }
        });
      }
  } catch(e) {}
}

const CURRENCIES_PLAYER = [
  {code:'USD', flag:'🇺🇸', name:'Долар США'},
  {code:'EUR', flag:'🇪🇺', name:'Євро'},
  {code:'PLN', flag:'🇵🇱', name:'Польський злотий'},
  {code:'GBP', flag:'🇬🇧', name:'Фунт стерлінгів'},
  {code:'CZK', flag:'🇨🇿', name:'Чеська крона'},
  {code:'CAD', flag:'🇨🇦', name:'Канадський долар'},
  {code:'CHF', flag:'🇨🇭', name:'Швейцарський франк'},
];

function renderCurrencyBoard(data) {
  const rows = CURRENCIES_PLAYER.filter(c => data[c.code+'_buy'] || data[c.code+'_sell']);
  if (!rows.length) return;
  const now = new Date();
  document.getElementById('currency-date').textContent =
    now.toLocaleDateString('uk-UA', {day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('currency-rows-display').innerHTML = rows.map(c => `
    <div class="currency-row">
      <div class="currency-flag">${c.flag}</div>
      <div class="currency-name">${c.name}</div>
      <div class="currency-val">${data[c.code+'_buy'] ? data[c.code+'_buy'].toFixed(2) : '—'}</div>
      <div class="currency-val">${data[c.code+'_sell'] ? data[c.code+'_sell'].toFixed(2) : '—'}</div>
    </div>`).join('');
  document.getElementById('currency-board').classList.add('show');
  document.getElementById('idle-frame').classList.add('has-bg');
}

function hideCurrencyBoard() {
  document.getElementById('currency-board').classList.remove('show');
}



// ── AD TOGGLE ──
window.toggleAd = () => {
  adActive = !adActive;
  const btn = document.getElementById('btn-toggle-ad');
  if (adActive) {
    btn.className = 'btn-toggle-ad on';
    btn.textContent = '▶ Реклама увімкнена';
    scheduleNext();
  } else {
    btn.className = 'btn-toggle-ad off';
    btn.textContent = '⏹ Реклама вимкнена';
    if (bannerTimeout) clearTimeout(bannerTimeout);
    showIdle();
    if (currentUtterance) window.speechSynthesis?.cancel();
  }
};

// ── RESET ──
let resetTaps = 0;
let resetTimer = null;

window.tapReset = () => {
  resetTaps++;
  clearTimeout(resetTimer);
  resetTimer = setTimeout(() => { resetTaps = 0; }, 2000);

  const btn = document.getElementById('btn-reset');
  btn.style.borderColor = `rgba(255,77,77,${resetTaps * 0.2})`;

  if (resetTaps >= 5) {
    resetTaps = 0;
    window.resetPlayer();
  }
};

window.resetPlayer = () => {
  if (!confirm('Скинути налаштування екрану?')) return;
  localStorage.removeItem('ads_code');
  localStorage.removeItem('ads_zone');
  localStorage.removeItem('ads_client_id');
  currentClientId = '';
  location.reload();
};

// ── SCHEDULE ──
function scheduleNext() {
  if (!adActive) return;
  if (bannerTimeout) clearTimeout(bannerTimeout);
  // Зупиняємо відео якщо грало
  const video = document.getElementById('banner-video');
  if (video && !video.paused) video.pause();
  showIdle();
  bannerTimeout = setTimeout(() => {
    if (!adActive) return;
    if (!banners.length) { scheduleNext(); return; }
    showBanner(banners[bannerIndex % banners.length]);
    bannerIndex++;
  }, PAUSE_BETWEEN);
}

function showIdle() {
  document.getElementById('idle-frame').style.opacity = '1';
  document.getElementById('idle-frame').style.zIndex = '1';
  document.getElementById('banner-frame').classList.remove('active');
  document.getElementById('banner-progress').style.transition = 'none';
  document.getElementById('banner-progress').style.width = '0%';
}

// ── TTS ──
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  if (currentUtterance) window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'uk-UA'; utt.rate = 0.9; utt.pitch = 1; utt.volume = 1;
  const trySpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const uk = voices.find(v => v.lang.startsWith('uk'));
    if (uk) utt.voice = uk;
    const radio = document.getElementById('radio');
    const prev = radio.volume;
    radio.volume = 0.15;
    utt.onend = () => { currentUtterance = null; radio.volume = prev; };
    utt.onerror = () => { currentUtterance = null; radio.volume = prev; };
    currentUtterance = utt;
    window.speechSynthesis.speak(utt);
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) { window.speechSynthesis.onvoiceschanged = trySpeak; }
  else { trySpeak(); }
}

// ── SHOW BANNER ──
function showBanner(banner) {
  if (!banner || !adActive) { scheduleNext(); return; }
  const img   = document.getElementById('banner-img');
  const video = document.getElementById('banner-video');
  const frame = document.getElementById('banner-frame');
  const progress = document.getElementById('banner-progress');
  const dur = (banner.duration || 30) * 1000;

  const activate = () => {
    document.getElementById('idle-frame').style.opacity = '0';
    frame.classList.add('active');
    progress.style.transition = 'none';
    progress.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progress.style.transition = `width ${dur}ms linear`;
      progress.style.width = '100%';
    }));
    try { updateDoc(doc(db,'banners',banner.id), { shows:(banner.shows||0)+1 }); } catch(e){}
    if (banner.voiceText) setTimeout(() => speak(banner.voiceText), 800);
    bannerTimeout = setTimeout(() => {
      window.speechSynthesis?.cancel();
      scheduleNext();
    }, dur);
  };

  if (banner.type === 'video') {
    img.style.display = 'none'; video.style.display = 'block';
    video.src = banner.imageUrl || '';
    // Зупиняємо радіо на час відео
    const radio = document.getElementById('radio');
    const wasPlaying = !radio.paused;
    if (wasPlaying) radio.pause();
    video.oncanplay = () => { video.play(); activate(); };
    video.onerror = () => { if (wasPlaying) radio.play(); scheduleNext(); };
    video.onended = () => { if (wasPlaying) radio.play(); };
  } else {
    video.style.display = 'none'; img.style.display = 'block';
    img.src = banner.imageUrl || '';
    img.onload = () => activate();
    img.onerror = () => scheduleNext();
  }
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('idle-clock').textContent = `${h}:${m}`;
  document.getElementById('status-time').textContent = `${h}:${m}`;
}

// ── MUSIC ──
window.playTag = async (btn, name) => {
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.genre-btn.mute').classList.remove('active');
  btn.classList.add('active');
  currentGenre = name; isMuted = false;
  document.getElementById('music-now').textContent = `♪ ${name}`;

  try {
    const res = await fetch(
      `https://de1.api.radio-browser.info/json/stations/bytag/${btn.dataset.tag}?limit=20&hidebroken=true&order=clickcount&reverse=true&codec=MP3`
    );
    const stations = await res.json();
    const https_s = stations.filter(s => s.url_resolved?.startsWith('https'));
    const list = https_s.length > 0 ? https_s : stations;
    if (!list.length) { showToast('❌ Немає станцій'); return; }
    const pick = list[Math.floor(Math.random() * Math.min(10, list.length))];
    const radio = document.getElementById('radio');
    radio.src = ''; radio.load();
    radio.src = pick.url_resolved || pick.url;
    radio.volume = 1;
    radio.play().catch(() => setTimeout(() => radio.play().catch(()=>{}), 1500));
    document.getElementById('music-now').textContent = `♪ ${pick.name}`;
  } catch(e) { showToast('❌ Помилка радіо'); }
};

window.toggleMute = btn => {
  const radio = document.getElementById('radio');
  isMuted = !isMuted;
  radio.volume = isMuted ? 0 : 1;
  btn.classList.toggle('active', isMuted);
  document.getElementById('music-now').textContent = isMuted ? '🔇 Тихо' : `♪ ${currentGenre||'Музика'}`;
};

// ── SCREENS ──
function showScreen(name) {
  document.getElementById('screen-setup').style.display  = name==='setup'  ? 'flex' : 'none';
  document.getElementById('screen-player').style.display = name==='player' ? 'flex' : 'none';
}

// ── AUTO RESTORE ──
const savedCode = localStorage.getItem('ads_code');
const savedZone = localStorage.getItem('ads_zone') || 'center';
const savedClientId = localStorage.getItem('ads_client_id') || '';
if (savedCode) {
  currentClientId = savedClientId;
  document.getElementById('setup-code').value = savedCode;
  currentZone = savedZone;
  document.querySelectorAll('.zone-opt').forEach(b=>{
    b.classList.toggle('selected', b.dataset.zone === savedZone);
  });
  showScreen('player');
  initPlayer(savedZone);
}

// ── FULLSCREEN ──
let isFullscreen = false;
window.toggleFullscreen = () => {
  const btn = document.getElementById('btn-shell');
  if (!isFullscreen) {
    document.documentElement.requestFullscreen?.()
      .then(() => {
        isFullscreen = true;
        btn.textContent = '✕ Вікно';
        btn.className = 'btn-shell active';
      })
      .catch(() => {
        // Якщо не вдалось — спробуємо через webkit
        const el = document.documentElement;
        (el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen)?.call(el);
        isFullscreen = true;
        btn.textContent = '✕ Вікно';
        btn.className = 'btn-shell active';
      });
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || 
     document.mozCancelFullScreen || document.msExitFullscreen)
      ?.call(document);
    isFullscreen = false;
    btn.textContent = '⛶ Екран';
    btn.className = 'btn-shell';
  }
};

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    isFullscreen = false;
    const btn = document.getElementById('btn-shell');
    if (btn) { btn.textContent = '⛶ Екран'; btn.className = 'btn-shell'; }
  }
});

// ── SHELL / PIN ──
let shellActive = false;
let savedPin = localStorage.getItem('ads_pin') || '';
let pinBuffer = '';
let pinMode = ''; // 'set' | 'unlock'
let logoTaps = 0;
let logoTimer = null;

// 5 тапів по логотипу → розблокувати
document.getElementById('idle-frame').addEventListener('click', () => {
  logoTaps++;
  if (logoTimer) clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoTaps = 0; }, 2000);
  if (logoTaps >= 5) {
    logoTaps = 0;
    if (shellActive) openPinModal('unlock');
  }
});

window.toggleShell = () => {
  if (!shellActive) {
    // Вмикаємо шел
    if (!savedPin) {
      openPinModal('set');
    } else {
      activateShell();
    }
  } else {
    openPinModal('unlock');
  }
};

function activateShell() {
  shellActive = true;
  const btn = document.getElementById('btn-shell');
  btn.className = 'btn-shell active';
  btn.textContent = '🔓 Шел';
  // Ховаємо панель водія
  document.querySelector('.driver-row').style.display = 'none';
  // Повноекранний режим
  document.documentElement.requestFullscreen?.().catch(()=>{});
}

function deactivateShell() {
  shellActive = false;
  const btn = document.getElementById('btn-shell');
  btn.className = 'btn-shell';
  btn.textContent = '🔒 Шел';
  document.querySelector('.driver-row').style.display = 'flex';
  document.exitFullscreen?.().catch(()=>{});
}

function openPinModal(mode) {
  pinMode = mode;
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-cancel').style.display = mode === 'set' ? 'block' : (shellActive ? 'none' : 'block');
  if (mode === 'set') {
    document.getElementById('pin-title').textContent = 'Встановити PIN';
    document.getElementById('pin-sub').textContent = 'Введіть 4 цифри для блокування екрану';
  } else {
    document.getElementById('pin-title').textContent = 'Введіть PIN';
    document.getElementById('pin-sub').textContent = 'Для розблокування екрану';
  }
  document.getElementById('pin-overlay').classList.add('active');
}

window.closePinModal = () => {
  document.getElementById('pin-overlay').classList.remove('active');
  pinBuffer = '';
};

window.pinPress = (key) => {
  const err = document.getElementById('pin-error');
  err.textContent = '';
  if (key === 'del') {
    pinBuffer = pinBuffer.slice(0,-1);
  } else if (key === 'ok') {
    if (pinBuffer.length < 4) { err.textContent = 'Введіть 4 цифри'; return; }
    if (pinMode === 'set') {
      savedPin = pinBuffer;
      localStorage.setItem('ads_pin', savedPin);
      closePinModal();
      activateShell();
    } else {
      if (pinBuffer === savedPin) {
        closePinModal();
        deactivateShell();
      } else {
        err.textContent = '❌ Невірний PIN';
        pinBuffer = '';
        updatePinDots();
      }
    }
  } else if (pinBuffer.length < 4) {
    pinBuffer += key;
    if (pinBuffer.length === 4 && pinMode === 'unlock') {
      if (pinBuffer === savedPin) {
        closePinModal();
        deactivateShell();
      } else {
        setTimeout(() => {
          err.textContent = '❌ Невірний PIN';
          pinBuffer = '';
          updatePinDots();
        }, 200);
      }
    }
  }
  updatePinDots();
};

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd'+i).className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
